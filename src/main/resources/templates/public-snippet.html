<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${snippet.title} + ' - CodeHub'">Shared Snippet - CodeHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <style>
        body { background: #f7f8fb; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .share-header { background: linear-gradient(45deg, #FF5722, #FF9800); color: white; padding: 2rem 0; }
        .snippet-card { border: 0; border-radius: 8px; box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12); overflow: hidden; }
        .language-tag { background: rgba(255,255,255,0.18); border-radius: 999px; padding: .25rem .7rem; font-size: .8rem; }
        pre { margin: 0; }
    </style>
</head>
<body>
<header class="share-header">
    <div class="container">
        <a class="navbar-brand text-white" th:href="@{/login}"><span class="brand-mark">&lt;/&gt;</span> CodeHub</a>
        <h1 class="mt-4 mb-2" th:text="${snippet.title}">Snippet title</h1>
        <div class="d-flex flex-wrap gap-2 align-items-center">
            <span class="language-tag" th:text="${snippet.language}">Java</span>
            <span th:if="${snippet.collectionName}" th:text="${snippet.collectionName}">Folder</span>
            <span th:if="${snippet.tags}" th:text="${snippet.tags}">tags</span>
        </div>
    </div>
</header>
<main class="container py-4">
    <article class="snippet-card bg-white">
        <pre><code th:class="'language-' + ${snippet.language.toLowerCase()}" th:text="${snippet.code}">// code</code></pre>
    </article>
    <section class="mt-4">
        <h2 class="h4">Comments</h2>
        <div class="alert alert-info" th:if="${#lists.isEmpty(comments)}">No comments yet.</div>
        <div class="card mb-2" th:each="comment : ${comments}">
            <div class="card-body">
                <strong th:text="${comment.user.username}">user</strong>
                <small class="text-muted" th:text="${#temporals.format(comment.createdAt, 'dd MMM yyyy HH:mm')}">date</small>
                <p class="mb-0" th:text="${comment.content}">comment</p>
            </div>
        </div>
        <a class="btn btn-primary btn-sm mt-2" th:href="@{/login}">Log in to comment</a>
    </section>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
<script>document.querySelectorAll('pre code').forEach((el) => hljs.highlightElement(el));</script>
</body>
</html>
