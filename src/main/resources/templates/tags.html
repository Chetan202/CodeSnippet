<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags - CodeHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg app-navbar">
    <div class="container"><a class="navbar-brand" th:href="@{/home}"><span class="brand-mark">&lt;/&gt;</span><span>CodeHub</span></a></div>
</nav>
<main class="container py-4">
    <h1 class="h3 mb-3">Tags</h1>
    <div class="d-flex flex-wrap gap-2">
        <a class="btn btn-outline-primary btn-sm" th:each="tag : ${tags}" th:href="@{/home(search=${tag.name})}" th:text="${tag.name}">tag</a>
    </div>
</main>
</body>
</html>
