<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version history - CodeHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <style>
        body { background: #f7f8fb; }
        .version-card { border: 0; border-radius: 8px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); overflow: hidden; }
        pre { max-height: 280px; overflow: auto; margin: 0; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg app-navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}"><span class="brand-mark">&lt;/&gt;</span><span>CodeHub</span></a>
    </div>
</nav>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h3 mb-1">Version history</h1>
            <p class="text-muted mb-0" th:text="${snippet.title}">Snippet title</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/snippets/{id}(id=${snippet.id})}">Back</a>
    </div>

    <div class="alert alert-info" th:if="${#lists.isEmpty(versions)}">No saved previous versions yet. Edit this snippet once to create a version.</div>

    <section class="version-card bg-white mb-3" th:each="version : ${versions}">
        <div class="p-3 d-flex flex-wrap justify-content-between gap-2">
            <div>
                <strong th:text="${version.title}">Title</strong>
                <div class="text-muted small" th:text="${#temporals.format(version.createdAt, 'dd MMM yyyy HH:mm')}">Date</div>
            </div>
            <form th:action="@{/snippets/{snippetId}/versions/{versionId}/revert(snippetId=${snippet.id},versionId=${version.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-sm btn-primary" type="submit">Revert</button>
            </form>
        </div>
        <pre><code th:class="'language-' + ${version.language.toLowerCase()}" th:text="${version.code}">// code</code></pre>
    </section>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
<script>document.querySelectorAll('pre code').forEach((el) => hljs.highlightElement(el));</script>
</body>
</html>
