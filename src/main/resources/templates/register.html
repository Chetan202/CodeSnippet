<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account - CodeHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<main class="auth-page">
    <section class="auth-intro">
        <a class="brand" th:href="@{/login}">
            <span class="brand-mark">&lt;/&gt;</span>
            <span>CodeHub</span>
        </a>
        <div class="auth-copy">
            <h1>Keep useful code within reach.</h1>
            <p>Create an account to save snippets, find them quickly, and keep your coding workflow organized.</p>
        </div>
    </section>

    <section class="auth-main">
        <div class="auth-card">
            <h2>Create your account</h2>
            <p class="auth-subtitle">Continue with Google or GitHub.</p>

            <div class="oauth-actions">
                <a class="oauth-button" th:href="@{/oauth2/authorization/google}">Continue with Google</a>
                <a class="oauth-button" th:href="@{/oauth2/authorization/github}">Continue with GitHub</a>
            </div>

            <p class="auth-footer">Already registered? <a th:href="@{/login}">Log in</a></p>
        </div>
    </section>
</main>
</body>
</html>
