<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Settings - CodeHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg app-navbar">
    <div class="container"><a class="navbar-brand" th:href="@{/home}"><span class="brand-mark">&lt;/&gt;</span><span>CodeHub</span></a></div>
</nav>
<main class="container py-4">
    <h1 class="h3 mb-3">Notification settings</h1>
    <div class="alert alert-success" th:if="${param.saved}">Settings saved.</div>
    <form method="post" th:action="@{/settings/notifications}" class="card">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="card-body">
            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="notifyComments" name="notifyComments" th:checked="${user.notifyComments}">
                <label class="form-check-label" for="notifyComments">Email me about comments</label>
            </div>
            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="notifyApprovals" name="notifyApprovals" th:checked="${user.notifyApprovals}">
                <label class="form-check-label" for="notifyApprovals">Email me about approvals</label>
            </div>
            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="notifyProductUpdates" name="notifyProductUpdates" th:checked="${user.notifyProductUpdates}">
                <label class="form-check-label" for="notifyProductUpdates">Email me product updates</label>
            </div>
            <button class="btn btn-primary" type="submit">Save</button>
        </div>
    </form>
</main>
</body>
</html>
