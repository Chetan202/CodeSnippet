<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify email - CodeHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<main class="auth-page">
    <section class="auth-intro">
        <a class="brand" th:href="@{/login}">
            <span class="brand-mark">&lt;/&gt;</span>
            <span>CodeHub</span>
        </a>
        <div class="auth-copy">
            <h1>Check your inbox.</h1>
            <p>We sent a 6-digit code to your email. Enter it below to activate your account.</p>
        </div>
        <p class="auth-note">The code expires in 10 minutes.</p>
    </section>

    <section class="auth-main">
        <div class="auth-card">
            <h2>Verify your email</h2>
            <p class="auth-subtitle" th:text="'Code sent to ' + ${email}"></p>

            <div class="alert alert-error" th:if="${error}">
                <p th:text="${error}"></p>
            </div>
            <div class="alert alert-success" th:if="${info}">
                <p th:text="${info}"></p>
            </div>

            <form th:action="@{/verify-otp}" method="post">
                <input type="hidden" name="email" th:value="${email}">
                <div class="form-group">
                    <label for="otp">Verification code</label>
                    <input type="text" id="otp" name="otp" required autofocus
                           maxlength="6" placeholder="000000"
                           style="letter-spacing: 0.3em; font-size: 1.5rem; text-align: center;">
                </div>
                <button type="submit" class="btn-primary">Verify</button>
            </form>

            <form th:action="@{/resend-otp}" method="post" style="margin-top: 1rem;">
                <input type="hidden" name="email" th:value="${email}">
                <button type="submit" class="btn-secondary" style="width:100%;">Resend code</button>
            </form>

            <p class="auth-footer"><a th:href="@{/register}">Back to register</a></p>
        </div>
    </section>
</main>
</body>
</html>
