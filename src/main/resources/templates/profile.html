<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${profileUser.username} + ' - CodeHub'">Profile - CodeHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg app-navbar">
    <div class="container"><a class="navbar-brand" th:href="@{/home}"><span class="brand-mark">&lt;/&gt;</span><span>CodeHub</span></a></div>
</nav>
<main class="container py-4">
    <h1 class="h3" th:text="${profileUser.username}">username</h1>
    <p class="text-muted">Public snippets</p>
    <div class="alert alert-info" th:if="${#lists.isEmpty(snippets)}">No public snippets yet.</div>
    <div class="row" th:each="snippet : ${snippets}">
        <div class="col-12 mb-3">
            <a class="card text-decoration-none text-dark" th:href="@{/share/{token}(token=${snippet.shareToken})}">
                <div class="card-body">
                    <h2 class="h5" th:text="${snippet.title}">Snippet</h2>
                    <span class="badge bg-secondary" th:text="${snippet.language}">Java</span>
                    <span class="text-muted ms-2" th:if="${snippet.tags}" th:text="${snippet.tags}">tags</span>
                </div>
            </a>
        </div>
    </div>
</main>
</body>
</html>
