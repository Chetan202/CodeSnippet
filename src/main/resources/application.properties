spring.application.name=CodeHub

# ?? SERVER ????????????????????????????????????????????????????????????????????
server.port=${PORT:8080}
server.servlet.context-path=/

# ?? DATASOURCE (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${PORTNO:5432}/${DBNAME:codehub}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DBusername:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DBpassword:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver
# Force Hibernate to match PostgreSQL naming conventions
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# ?? JPA / HIBERNATE
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ?? THYMELEAF
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

#  MAIL (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${MAIL_USERNAME:${email:}}
spring.mail.password=${MAIL_PASSWORD:${emailPassword:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=false


# APPLICATION & JWT
app.base-url=${APP_BASE_URL:http://localhost:${PORT:8080}}
jwt.secret=${JWT_SECRET:mySecretKey12345678901234567890123456789012}
jwt.expiration=86400000

#  LOGGING
logging.level.com.CodeHub=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
